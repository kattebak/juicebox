name: lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: shellcheck --version
      - run: make lint

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: --help
        run: ./bin/juicebox --help
      - name: status (empty state)
        run: HOME=$(mktemp -d) ./bin/juicebox status
